<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Upload tài liệu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="upload.css">
</head>

<body>

<header class="header">
  <a href="index.html" class="logo">tailieucnttpka</a>
</header>

<!-- UPLOAD BOX -->
<div class="upload-box">
  <h2>Upload tài liệu (Admin)</h2>

  <input id="title" placeholder="Tiêu đề tài liệu">

  <select id="subject">
    <option value="">-- Chọn môn học --</option>
  </select>

  <input type="file" id="file">

  <button onclick="upload()">Upload</button>

  <p id="upload-msg"></p>

  <h3>Thêm môn học</h3>

  <input id="subCode" placeholder="Mã môn">
  <input id="subName" placeholder="Tên môn">

  <button onclick="addSubject()">Thêm môn</button>
</div>

<script>
const API = "https://api-chia-se-tai-lieu.onrender.com/api";
const user = JSON.parse(localStorage.getItem("user"));

// ===== CHECK ADMIN =====
if (!user || user.role !== "admin") {
  alert("Chỉ admin mới được upload tài liệu");
  window.location.href = "index.html";
}

// ===== LOAD SUBJECT =====
async function loadSubjects() {
  const res = await fetch(`${API}/subjects`);
  const subjects = await res.json();

  const select = document.getElementById("subject");
  select.innerHTML = `<option value="">-- Chọn môn học --</option>`;

  subjects.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s.code;
    opt.innerText = `${s.code} - ${s.name}`;
    select.appendChild(opt);
  });
}

// ===== UPLOAD =====
async function upload() {
  const title = document.getElementById("title").value;
  const subject = document.getElementById("subject").value;
  const file = document.getElementById("file").files[0];

  if (!title || !subject || !file) {
    return alert("Vui lòng nhập đủ thông tin");
  }

  const formData = new FormData();
  formData.append("title", title.trim());
  formData.append("subject", subject.trim());
  formData.append("userId", user.id);
  formData.append("file", file);

  try {
    const res = await fetch("https://api-chia-se-tai-lieu.onrender.com/api/documents/upload", {
      method: "POST",
      headers: {
        role: user.role
      },
      body: formData
    });

    const data = await res.json();

    console.log("UPLOAD RESPONSE:", data);

    if (!res.ok) {
      return alert(data.message);
    }

    alert("Upload thành công!");

    // 👉 chuyển sang trang documents luôn
    window.location.href = `documents.html?subject=${subject}`;

  } catch (err) {
    console.error("UPLOAD ERROR:", err);
    alert("Upload lỗi!");
  }
}

// ===== ADD SUBJECT =====
async function addSubject() {
  const code = document.getElementById("subCode").value;
  const name = document.getElementById("subName").value;

  if (!code || !name) {
    return alert("Vui lòng nhập đủ thông tin");
  }

  try {
    const res = await fetch(`${API}/subjects`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        role: user.role   // 👈 QUAN TRỌNG
      },
      body: JSON.stringify({ code, name })
    });

    const data = await res.json();
    alert(data.message);

    loadSubjects();

  } catch (err) {
    console.error(err);
    alert("Lỗi thêm môn");
  }
}

loadSubjects();
</script>

</body>
</html>
