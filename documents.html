<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Tài liệu theo môn</title>
  <link rel="stylesheet" href="documents.css" />
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">tailieucnttpka</a>
</header>

<main class="container">
  <h2 id="subjectTitle">Danh sách tài liệu</h2>

  <table>
    <thead>
      <tr>
        <th>Tiêu đề</th>
        <th>Người upload</th>
        <th>Ngày</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="docList"></tbody>
  </table>
</main>

<script>
  const user = JSON.parse(localStorage.getItem("user"));
  const params = new URLSearchParams(window.location.search);
  const subject = params.get('subject');

  if (subject) {
    document.getElementById('subjectTitle').innerText =
      `Tài liệu môn: ${subject}`;
  }

  fetch(`https://api-chia-se-tai-lieu.onrender.com/api/documents?subject=${subject}`)
    .then(res => res.json())
    .then(data => {
      console.log("DATA:", data);

      const tbody = document.getElementById('docList');

      if (data.length === 0) {
        tbody.innerHTML =
          `<tr><td colspan="4">Chưa có tài liệu</td></tr>`;
        return;
      }

      data.forEach(doc => {
        const tr = document.createElement('tr');

        let actionBtn = `
          <a class="btn download" href="https://api-chia-se-tai-lieu.onrender.com/uploads/${doc.filename}" target="_blank">
            ⬇ Tải
          </a>
        `;

        if (user && user.role === "admin") {
          actionBtn += `
           <button class="btn delete" onclick="deleteDoc('${doc._id}')">
              🗑 Xóa
            </button>
          `;
        }

        tr.innerHTML = `
          <td>${doc.title}</td>
          <td>${doc.uploader?.username || 'Ẩn danh'}</td>
          <td>${new Date(doc.uploadedAt).toLocaleDateString()}</td>
          <td>${actionBtn}</td>
        `;

        tbody.appendChild(tr);
      });
    });
    async function deleteDoc(id) {
      if (!confirm("Bạn có chắc muốn xóa tài liệu này?")) return;

      const res = await fetch(`https://api-chia-se-tai-lieu.onrender.com/api/documents/${id}`, {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json",
          "role": user.role   // 👈 QUAN TRỌNG
        }
      });

      const data = await res.json();
      alert(data.message);

      location.reload();
    }
</script>

</body>
</html>
