<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chia sẻ tài liệu sinh viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <a href="index.html" class="logo">tailieucnttpka</a>
  <nav class="nav" id="navAuth">
    <button id="loginBtn">Đăng nhập</button>
  </nav>
</header>

<!-- MAIN -->
<main class="container">
  <h2>Danh sách môn học</h2>
  <ul id="subjectList"></ul>
</main>

<!-- LOGIN / REGISTER -->
<div class="overlay" id="popupOverlay">
  <div class="popup">

    <div id="loginForm">
      <h3>Đăng nhập</h3>
      <input id="loginUser" placeholder="Username">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Đăng nhập</button>
      <p>Chưa có tài khoản? <span onclick="showRegister()">Đăng ký</span></p>
    </div>

    <div id="registerForm" style="display:none">
      <h3>Đăng ký</h3>
      <input id="regUser" placeholder="Username">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Đăng ký</button>
      <p>Đã có tài khoản? <span onclick="showLogin()">Đăng nhập</span></p>
    </div>

    <span id="closeBtn">✖</span>
  </div>
</div>

<script>
  const API = "https://api-chia-se-tai-lieu.onrender.com/api";

// ===== POPUP =====
const overlay = document.getElementById("popupOverlay");
const loginBtn = document.getElementById("loginBtn");
const closeBtn = document.getElementById("closeBtn");

loginBtn.onclick = () => overlay.style.display = "flex";
closeBtn.onclick = () => overlay.style.display = "none";

function showRegister() {
  loginForm.style.display = "none";
  registerForm.style.display = "block";
}

function showLogin() {
  registerForm.style.display = "none";
  loginForm.style.display = "block";
}

// ===== LOGIN =====
async function login() {
  const username = loginUser.value;
  const password = loginPass.value;

  const res = await fetch(`${API}/users/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.message);

  //  LƯU USER
  localStorage.setItem("user", JSON.stringify(data.user));

  overlay.style.display = "none";
  renderAuth();
  loadSubjects(); //  thêm dòng này
}

// ===== REGISTER =====
async function register() {
  const username = regUser.value;
  const password = regPass.value;

  const res = await fetch(`${API}/users/register`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.message);

  alert("Đăng ký thành công");
  showLogin();
}

// ===== LOGOUT =====
function logout() {
  localStorage.removeItem("user");
  renderAuth();
  loadSubjects();
}

// ===== HIỂN THỊ HEADER =====
function renderAuth() {
  const nav = document.getElementById("navAuth");
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    nav.innerHTML = `<button id="loginBtn">Đăng nhập</button>`;
    document.getElementById("loginBtn").onclick =
      () => document.getElementById("popupOverlay").style.display = "flex";
  } else {
    let html = `<span>Xin chào, <b>${user.username}</b></span>`;

    //  CHỈ ADMIN MỚI THẤY UPLOAD
    if (user.role === "admin") {
      html += `<a href="upload.html" style="margin-left:15px">Upload</a>`;
    }

    html += `<button onclick="logout()" style="margin-left:10px">Đăng xuất</button>`;
    nav.innerHTML = html;
  }
}

// ===== LOAD SUBJECTS =====
async function loadSubjects() {
  const user = JSON.parse(localStorage.getItem("user"));
  try {
    const res = await fetch(`${API}/subjects`);
    const subjects = await res.json();

    const list = document.getElementById("subjectList");
    list.innerHTML = "";

    subjects.forEach(s => {
      const li = document.createElement("li");

        let action = `
          <a href="documents.html?subject=${s.code}">
            <b>${s.code}</b> - ${s.name}
          </a>
        `;

        if (user && user.role === "admin") {
          action += `
            <button onclick="deleteSubject('${s._id}')">Xóa</button>
          `;
        }

      li.innerHTML = action;
      list.appendChild(li);
    });
  } catch {
    alert("Không tải được danh sách môn học");
  }
}

// ===== DELETE SUBJECT =====
async function deleteSubject(id) {
  if (!confirm("Bạn có chắc muốn xóa môn này?")) return;

  const user = JSON.parse(localStorage.getItem("user"));

  const res = await fetch(`${API}/subjects/${id}`, {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json",
      "role": user.role   //  gửi qua header
    }
  });


  const data = await res.json();
  alert(data.message);

  loadSubjects(); // reload lại list
}

// ===== INIT =====
renderAuth();
loadSubjects();
</script>

</body>
</html>
